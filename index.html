<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Gerador de Relatório - SENAI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container no-print">
        <div class="logo-container">
            <img src="senai-logo.png" alt="Logo SENAI" class="logo-img">
        </div>
        <h1>Ordem de Manutenção</h1>
        <p class="subtitle">Preencha os detalhes da manutenção abaixo.</p>
        
        <form id="maintenance-form">
            <div class="form-grid">
                
                <div class="form-group full-width">
                    <label for="maquina">Nome da Máquina *</label>
                    <input type="text" id="maquina" required placeholder="Ex: Torno CNC">
                </div>

                <div class="form-group">
                    <label for="patrimonio">Patrimônio *</label>
                    <input type="text" id="patrimonio" required placeholder="Ex: MG-123456">
                </div>

                <div class="form-group">
                    <label for="unidade">Unidade SENAI *</label>
                    <input type="text" id="unidade" required placeholder="Ex: CFP Américo Renê">
                </div>

                <div class="form-group">
                    <label for="local">Local (Sala/Laboratório) *</label>
                    <input type="text" id="local" required placeholder="Ex: Laboratório 05">
                </div>

                <div class="form-group">
                    <label>Tipo de Manutenção *</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="tipo_manutencao" value="Preventiva" checked style="width:auto;"> Preventiva
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="tipo_manutencao" value="Corretiva" style="width:auto;"> Corretiva
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="data_manutencao">Data da Manutenção *</label>
                    <input type="date" id="data_manutencao" required>
                </div>

                <div class="form-group">
                    <label for="proxima_manutencao">Próxima Manutenção *</label>
                    <input type="date" id="proxima_manutencao" required>
                </div>

                <div class="form-group">
                    <label for="executor">Executor *</label>
                    <input type="text" id="executor" required placeholder="Nome do técnico">
                </div>

                <div class="form-group">
                    <label for="chamado">Nº do Chamado</label>
                    <input type="text" id="chamado" placeholder="Opcional">
                </div>

                <div class="form-group full-width">
                    <label for="procedimentos">Procedimentos Realizados *</label>
                    <textarea id="procedimentos" required placeholder="Descreva o que foi feito..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Gerar Relatório / Imprimir</button>
            </div>
        </form>
    </div>

    <div id="report-preview">
        <div class="report-header">
            <img src="senai-logo.png" alt="Logo SENAI" class="logo-print">
            <div class="report-title-print">Relatório de Manutenção</div>
        </div>

        <table class="report-table">
            <tr>
                <td class="bg-gray">Unidade:</td>
                <td id="p-unidade" colspan="3"></td>
            </tr>
            <tr>
                <td class="bg-gray">Máquina / Equip.:</td>
                <td id="p-maquina" style="width: 40%;"></td>
                <td class="bg-gray">Patrimônio:</td>
                <td id="p-patrimonio"></td>
            </tr>
            <tr>
                <td class="bg-gray">Local / Sala:</td>
                <td id="p-local"></td>
                <td class="bg-gray">Nº Chamado:</td>
                <td id="p-chamado"></td>
            </tr>
            <tr>
                <td class="bg-gray">Tipo Manutenção:</td>
                <td id="p-tipo"></td>
                <td class="bg-gray">Executado em:</td>
                <td id="p-data"></td>
            </tr>
            <tr>
                <td class="bg-gray">Executor:</td>
                <td id="p-executor"></td>
                <td class="bg-gray">Próxima Manut.:</td>
                <td id="p-proxima"></td>
            </tr>
        </table>

        <h4 style="margin: 15px 0 5px 0; font-size: 14px; text-transform: uppercase; color: var(--primary-color);">Procedimentos Realizados:</h4>
        <div id="p-procedimentos" class="procedimentos-box"></div>

        <div class="signatures">
            <div class="signature-line">
                <span id="p-sign-executor"></span><br>
                Técnico Executor
            </div>
            <div class="signature-line">
                <br>
                Responsável / Recebimento
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
